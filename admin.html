<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rame Admin | Productos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>
  <main class="admin-wrap">
    <section class="admin-header gated-content">
      <h1>Rame Admin</h1>
      <p>Gestiona tu catalogo online con el mismo estilo de la tienda.</p>
      <a class="back-link" href="index.html">Volver a la tienda</a>
    </section>

    <section class="admin-card" id="auth-card">
      <h2>Acceso</h2>
      <form id="auth-form" class="admin-form auth-form">
        <label>Email
          <input type="email" id="auth-email" required />
        </label>
        <label>Contrasena
          <input type="password" id="auth-password" required />
        </label>
        <div class="actions">
          <button type="submit">Iniciar sesion</button>
          <button type="button" id="logout-btn" class="ghost" hidden>Cerrar sesion</button>
        </div>
        <p id="auth-status" class="status">No autenticada.</p>
      </form>
    </section>

    <section class="admin-card gated-content" id="manager-card" hidden>
      <h2 id="form-title">Nuevo producto</h2>
      <form id="product-form" class="admin-form">
        <input type="hidden" id="product-id" />

        <label>Nombre
          <input type="text" id="name" required />
        </label>

        <div class="grid-2">
          <label>Precio Efectivo/Transferencia
            <input type="number" id="price" min="0" required />
          </label>
          <label>Precio Tarjeta
            <input type="number" id="priceCard" min="0" required />
          </label>
        </div>

        <div class="grid-2">
          <label>Categoria (puedes crear nuevas)
            <input type="text" id="category" list="category-options" placeholder="Ej: pijamas" required />
            <datalist id="category-options"></datalist>
          </label>
          <label>Subcategoria
            <input type="text" id="subCategory" list="subcategory-options" placeholder="Ej: corto" />
            <datalist id="subcategory-options"></datalist>
          </label>
        </div>

        <label>Badge (opcional)
          <input type="text" id="badge" placeholder="Ej: Nuevo" />
        </label>

        <label>Talles (separados por coma)
          <input type="text" id="sizes" placeholder="S, M, L, XL" required />
        </label>

        <label>Imagenes (max 4)
          <input type="file" id="images-upload" accept="image/*" multiple />
        </label>

        <label>Imagenes por URL/ruta (una por linea, opcional)
          <textarea id="images" rows="4" placeholder="img/carpeta/foto1.jpg&#10;https://.../foto2.jpg"></textarea>
        </label>

        <div id="image-preview" class="image-preview"></div>

        <div class="actions">
          <button type="submit" id="save-btn">Guardar producto</button>
          <button type="button" id="cancel-edit" class="ghost" hidden>Cancelar edicion</button>
          <button type="button" id="import-local-products" class="ghost">Importar productos guardados en esta pagina</button>
          <button type="button" id="reset-products" class="danger">Restaurar catalogo inicial</button>
        </div>
      </form>
    </section>

    <section class="admin-card gated-content" id="list-card" hidden>
      <div class="list-head">
        <h2>Productos cargados</h2>
        <span id="count"></span>
      </div>

      <div class="toolbar">
        <input type="text" id="search-products" placeholder="Buscar por nombre..." />
        <select id="filter-category">
          <option value="all">Todas las categorias</option>
        </select>
        <select id="sort-products">
          <option value="newest">Mas nuevos</option>
          <option value="oldest">Mas viejos</option>
          <option value="name_asc">Nombre A-Z</option>
          <option value="name_desc">Nombre Z-A</option>
          <option value="price_asc">Precio menor-mayor</option>
          <option value="price_desc">Precio mayor-menor</option>
        </select>
      </div>

      <div id="product-list" class="product-list"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
